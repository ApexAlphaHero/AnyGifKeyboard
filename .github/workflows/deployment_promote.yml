---
name: deployment-promote
on:
  # Fork: upstream-only automation (promotes upstream release branches). Disabled
  # on this fork - cannot pass without upstream deploy secrets. Manual run only.
  workflow_dispatch:
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
env:
  TERM: dumb
jobs:
  promote:
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        refname: [main, release-branch-addons-v5.1-r2, release-branch-ime-v1.13-r1]
      fail-fast: false
    steps:
      - uses: actions/checkout@v6.0.2
        with:
          ref: ${{ matrix.refname }}
      - uses: ./.github/actions/deploy-request
        with:
          gh_user: ${{ secrets.BOT_MASTER_RW_GITHUB_USERNAME }}
          gh_token: ${{ secrets.BOT_MASTER_RW_GITHUB_TOKEN }}
          refname: "${{ matrix.refname }}"
          deploy_mode: force_promote
